services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
  worker:
    build: .
    command: python -m app.worker.main
    env_file: .env
    volumes:
      - ./data:/app/data
