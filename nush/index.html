<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>NUSH — e-commerce, marketing i systemy wzrostu</title>
    <meta name="description" content="NUSH to osadzony w biznesie zespół od e-commerce, marketingu, analityki i automatyzacji. Budujemy systemy cyfrowej sprzedaży, które pomagają firmom rosnąć." />
    <meta name="keywords" content="NUSH, e-commerce, marketing, analityka, automatyzacja, systemy wzrostu, performance marketing, optymalizacja konwersji, embedded team" />
    <meta name="author" content="NUSH" />
    <link rel="canonical" href="https://nush.pl/" /> <!-- Miejsce pod canonical URL -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nush.pl/" />
    <meta property="og:title" content="NUSH — e-commerce, marketing i systemy wzrostu" />
    <meta property="og:description" content="Zintegrowany zespół e-commerce i wzrostu. Built like it’s ours. Made to remain yours." />
    <meta property="og:image" content="/og-image.jpg" /> <!-- Miejsce pod Open Graph Image -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nush.pl/" />
    <meta property="twitter:title" content="NUSH — e-commerce, marketing i systemy wzrostu" />
    <meta property="twitter:description" content="Zintegrowany zespół e-commerce i wzrostu. Built like it’s ours. Made to remain yours." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Favicon Placeholders -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Schema.org JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NUSH",
        "alternateName": "NUSH Embedded commerce & growth team",
        "url": "https://nush.pl/",
        "logo": "https://nush.pl/logo.png",
        "sameAs": [
          "https://www.linkedin.com/company/nush",
          "https://www.instagram.com/nush"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@nush.pl",
          "contactType": "customer support"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "NUSH",
        "image": "https://nush.pl/og-image.jpg",
        "url": "https://nush.pl/",
        "email": "hello@nush.pl",
        "priceRange": "$$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "PL"
        },
        "description": "Zintegrowany zespół e-commerce i wzrostu odpowiedzialny za sprzedaż cyfrową, analitykę i automatyzacje."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
